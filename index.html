<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alerte Vigne</title>

<style>

body{
font-family:Arial,Helvetica,sans-serif;
background:#f3f4f6;
margin:0;
color:#111;
}

header{
background:#2f6f44;
color:white;
padding:20px;
font-size:26px;
font-weight:bold;
text-align:center;
}

.container{
max-width:1000px;
margin:auto;
padding:14px;
}

.card{
background:white;
margin:16px 0;
padding:20px;
border-radius:14px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-top:0;
}

input{
width:100%;
padding:14px;
font-size:18px;
border-radius:10px;
border:2px solid #333;
margin-bottom:10px;
}

button{
padding:14px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
color:white;
font-weight:bold;
}

.btn-row{
display:flex;
gap:10px;
}

.green{background:#2f6f44}
.gray{background:#596275}

.big{
font-size:30px;
font-weight:bold;
text-align:center;
}

.small{
text-align:center;
color:#6b7280;
}

.mini-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

.mini{
background:#f8fafc;
border-radius:10px;
padding:14px;
text-align:center;
border:1px solid #e5e7eb;
}

.mini-value{
font-size:26px;
font-weight:bold;
}

.risk-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

.risk{
padding:14px;
border-radius:10px;
text-align:center;
border:1px solid #e5e7eb;
}

.hours-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

.hour{
background:#fafafa;
padding:12px;
border-radius:10px;
border:1px solid #e5e7eb;
text-align:center;
}

.chart-row{
display:grid;
grid-template-columns:110px 1fr 70px;
gap:10px;
align-items:center;
margin-bottom:8px;
}

.chart-track{
height:16px;
background:#e5e7eb;
border-radius:999px;
overflow:hidden;
}

.chart-fill{
height:100%;
}

.fill-green{background:#16a34a}
.fill-orange{background:#ea580c}
.fill-red{background:#dc2626}

.best-window{
background:#f8fafc;
padding:16px;
border-radius:10px;
border:1px solid #e5e7eb;
text-align:center;
}

@media(max-width:800px){

.mini-grid{grid-template-columns:repeat(2,1fr)}
.risk-grid{grid-template-columns:repeat(2,1fr)}
.hours-grid{grid-template-columns:repeat(2,1fr)}

}

</style>
</head>


<body>

<header>🍇 Alerte Vigne</header>

<div class="container">

<div class="card">

<h2>Localisation</h2>

<input id="ville" placeholder="Nom de la ville">

<div class="btn-row">
<button class="green" onclick="getWeather()">Voir météo</button>
<button class="gray" onclick="gps()">GPS</button>
</div>

<div class="small" id="statusText">Entrer une ville</div>

</div>



<div class="card">

<h2>Lieu</h2>

<div class="big" id="placeName">---</div>
<div class="small" id="coords">---</div>

</div>



<div class="card">

<h2>Météo actuelle</h2>

<div class="mini-grid">

<div class="mini">
Température
<div class="mini-value" id="tempNow">--</div>
</div>

<div class="mini">
Humidité
<div class="mini-value" id="humidityNow">--</div>
</div>

<div class="mini">
Pluie
<div class="mini-value" id="rainNow">--</div>
</div>

<div class="mini">
Vent
<div class="mini-value" id="windNow">--</div>
</div>

</div>

</div>



<div class="card">

<h2>Décision</h2>

<div class="big" id="decisionMain">---</div>
<div class="small" id="decisionText">---</div>

</div>



<div class="card">

<h2>Risques</h2>

<div class="risk-grid">

<div class="risk">
Mildiou
<div id="mildiouValue">---</div>
</div>

<div class="risk">
Oïdium
<div id="oidiumValue">---</div>
</div>

<div class="risk">
Black rot
<div id="blackrotValue">---</div>
</div>

<div class="risk">
Eudémis
<div id="eudemisValue">---</div>
</div>

</div>

</div>



<div class="card">

<h2>Heures traitement</h2>

<div class="hours-grid" id="hoursGrid"></div>

</div>



<div class="card">

<h2>Risque mildiou 7 jours</h2>

<div id="mildiouChart"></div>

</div>



<div class="card">

<h2>Meilleure fenêtre</h2>

<div class="best-window" id="bestWindowBox">---</div>

</div>



</div>


<script>

function gps(){
navigator.geolocation.getCurrentPosition(function(pos){
loadWeather(pos.coords.latitude,pos.coords.longitude,"GPS")
})
}

function getWeather(){

let ville=document.getElementById("ville").value

fetch("https://geocoding-api.open-meteo.com/v1/search?name="+ville+"&count=1")
.then(r=>r.json())
.then(data=>{
let lat=data.results[0].latitude
let lon=data.results[0].longitude
let place=data.results[0].name
loadWeather(lat,lon,place)
})

}

function loadWeather(lat,lon,place){

let url="https://api.open-meteo.com/v1/forecast?latitude="+lat+"&longitude="+lon+"&current=temperature_2m,precipitation,wind_speed_10m,relative_humidity_2m&hourly=temperature_2m,precipitation,wind_speed_10m,relative_humidity_2m&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,wind_speed_10m_max&timezone=auto"

fetch(url)
.then(r=>r.json())
.then(data=>{

document.getElementById("placeName").innerText=place
document.getElementById("coords").innerText="Lat "+lat+" | Lon "+lon

document.getElementById("tempNow").innerText=data.current.temperature_2m+"°C"
document.getElementById("humidityNow").innerText=data.current.relative_humidity_2m+"%"
document.getElementById("rainNow").innerText=data.current.precipitation+" mm"
document.getElementById("windNow").innerText=data.current.wind_speed_10m+" km/h"

decision(data)
hours(data.hourly)
chart(data)

})

}



function decision(data){

let rainTomorrow=data.daily.precipitation_sum[1]
let humidity=data.current.relative_humidity_2m

let decision="Attendre"
let txt="Situation calme"

if(rainTomorrow>8){
decision="Éviter traitement"
txt="Pluie forte demain"
}

else if(humidity>85){
decision="Traiter"
txt="Risque mildiou élevé"
}

document.getElementById("decisionMain").innerText=decision
document.getElementById("decisionText").innerText=txt

document.getElementById("mildiouValue").innerText=humidity>85?"Élevé":"Faible"
document.getElementById("oidiumValue").innerText="Moyen"
document.getElementById("blackrotValue").innerText="Faible"
document.getElementById("eudemisValue").innerText="Faible"

}



function hours(h){

let container=document.getElementById("hoursGrid")

container.innerHTML=""

for(let i=0;i<8;i++){

let hour=h.time[i].split("T")[1]

let wind=h.wind_speed_10m[i]
let rain=h.precipitation[i]

let status="Correct"

if(wind<15 && rain<0.2)status="Idéal"
if(wind>25 || rain>1)status="Éviter"

container.innerHTML+=`
<div class="hour">
<strong>${hour}</strong><br>
${status}<br>
Vent ${wind}<br>
Pluie ${rain}
</div>
`

}

}



function chart(data){

let days=["Aujourd’hui","Demain","J+2","J+3","J+4","J+5","J+6"]

let html=""
let best=0
let bestDay="---"

for(let i=0;i<7;i++){

let rain=data.daily.precipitation_sum[i]
let wind=data.daily.wind_speed_10m_max[i]
let score=rain*10

if(score>100)score=100

let color="fill-green"

if(score>40)color="fill-orange"
if(score>70)color="fill-red"

html+=`

<div class="chart-row">

<div>${days[i]}</div>

<div class="chart-track">
<div class="chart-fill ${color}" style="width:${score}%"></div>
</div>

<div>${score}</div>

</div>

`

if(score>best){
best=score
bestDay=days[i]
}

}

document.getElementById("mildiouChart").innerHTML=html

document.getElementById("bestWindowBox").innerHTML="Jour le plus favorable : <b>"+bestDay+"</b>"

}

</script>

</body>
</html>
