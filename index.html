
<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Alerte Vigne</title>

<style>

body{
font-family:Arial;
background:#f3f4f6;
margin:0;
text-align:center;
}

header{
background:#2f6f44;
color:white;
padding:20px;
font-size:24px;
font-weight:bold;
}

.card{
background:white;
margin:20px;
padding:20px;
border-radius:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

input{
padding:12px;
width:80%;
font-size:16px;
margin:10px;
}

button{
padding:12px 18px;
margin:5px;
border:none;
border-radius:8px;
background:#2f6f44;
color:white;
font-size:16px;
}

.hour-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:10px;
}

.hour-card{
background:#f8fafc;
padding:10px;
border-radius:10px;
}

.good{color:green;font-weight:bold}
.warn{color:orange;font-weight:bold}
.bad{color:red;font-weight:bold}

</style>
</head>


<body>

<header>
🍇 Alerte Vigne
</header>


<div class="card">

<h2>Localisation</h2>

<input id="ville" placeholder="Nom de la ville ou village">

<br>

<button onclick="getWeather()">Voir météo</button>
<button onclick="gps()">Utiliser GPS</button>

</div>



<div class="card">

<h2>Météo actuelle</h2>

<div id="meteo">---</div>

</div>



<div class="card">

<h2>Décision traitement</h2>

<div id="decision">---</div>

</div>



<div class="card">

<h2>Meilleure heure pour traiter</h2>

<div class="hour-grid" id="hours"></div>

</div>



<script>


function gps(){

navigator.geolocation.getCurrentPosition(function(pos){

loadWeather(pos.coords.latitude,pos.coords.longitude)

})

}



function getWeather(){

let ville=document.getElementById("ville").value

fetch("https://geocoding-api.open-meteo.com/v1/search?name="+ville)

.then(r=>r.json())
.then(data=>{

let lat=data.results[0].latitude
let lon=data.results[0].longitude

loadWeather(lat,lon)

})

}



function loadWeather(lat,lon){

let url="https://api.open-meteo.com/v1/forecast?latitude="+lat+
"&longitude="+lon+
"&current=temperature_2m,precipitation,wind_speed_10m,relative_humidity_2m"+
"&hourly=temperature_2m,precipitation,wind_speed_10m,relative_humidity_2m"+
"&daily=precipitation_sum,wind_speed_10m_max"+
"&timezone=auto"

fetch(url)
.then(r=>r.json())
.then(data=>{

let temp=data.current.temperature_2m
let rain=data.current.precipitation
let wind=data.current.wind_speed_10m

document.getElementById("meteo").innerHTML=

"Température : "+temp+"°C<br>"+
"Pluie : "+rain+" mm<br>"+
"Vent : "+wind+" km/h"


decision(data)

hours(data.hourly)

})

}



function decision(data){

let rainTomorrow=data.daily.precipitation_sum[1]
let wind=data.current.wind_speed_10m
let humidity=data.current.relative_humidity_2m

let text="Attendre"

if(wind>25){

text="❌ Éviter traitement (vent fort)"

}

else if(rainTomorrow>10){

text="❌ Éviter traitement aujourd'hui (pluie forte demain)"

}

else if(rainTomorrow>2){

text="⚠ Traiter seulement si fenêtre sèche"

}

else if(humidity>85){

text="⚠ Risque mildiou — traitement conseillé"

}

else{

text="✅ Situation calme"

}

document.getElementById("decision").innerHTML=text

}



function hours(hourly){

let container=document.getElementById("hours")

container.innerHTML=""

for(let i=0;i<8;i++){

let hour=hourly.time[i].split("T")[1]

let wind=hourly.wind_speed_10m[i]

let rain=hourly.precipitation[i]

let status="Correct"
let cls="warn"

if(wind<15 && rain<0.3){
status="Idéal"
cls="good"
}

if(wind>25 || rain>1){
status="À éviter"
cls="bad"
}

container.innerHTML+=`

<div class="hour-card">

${hour}<br>

<span class="${cls}">${status}</span><br>

Vent ${wind} km/h<br>

Pluie ${rain} mm

</div>

`

}

}



</script>

</body>
</html>
