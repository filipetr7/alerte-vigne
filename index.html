<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alerte Vigne</title>

<style>

body{
font-family:Arial,Helvetica,sans-serif;
background:#f3f4f6;
margin:0;
color:#111;
}

header{
background:#2f6f44;
color:white;
padding:20px;
font-size:26px;
font-weight:bold;
text-align:center;
}

.container{
max-width:1000px;
margin:auto;
padding:15px;
}

.card{
background:white;
margin:15px 0;
padding:20px;
border-radius:14px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-top:0;
}

input{
width:100%;
padding:14px;
font-size:18px;
border-radius:10px;
border:2px solid #333;
margin-bottom:12px;
box-sizing:border-box;
}

button{
padding:14px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
color:white;
font-weight:bold;
}

.btn-row{
display:flex;
gap:10px;
}

.green{background:#2f6f44}
.gray{background:#596275}

.big{
font-size:32px;
text-align:center;
font-weight:bold;
margin:10px 0;
}

.small{
text-align:center;
color:#6b7280;
}

.banner{
padding:18px;
border-radius:14px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.good{background:#e7f9ed;color:#166534}
.warn{background:#fff4e5;color:#b45309}
.bad{background:#fde8e8;color:#b91c1c}

.mini-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

.mini{
background:#f9fafb;
border-radius:12px;
padding:15px;
text-align:center;
border:1px solid #e5e7eb;
}

.mini-title{
font-size:14px;
color:#6b7280;
}

.mini-value{
font-size:26px;
font-weight:bold;
}

.risk-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

.risk{
padding:14px;
border-radius:12px;
text-align:center;
border:1px solid #e5e7eb;
}

.risk-low{background:#e7f9ed;color:#166534}
.risk-mid{background:#fff4e5;color:#b45309}
.risk-high{background:#fde8e8;color:#b91c1c}

.hours-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

.hour{
border-radius:10px;
padding:12px;
background:#fafafa;
border:1px solid #e5e7eb;
text-align:center;
}

.week-calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
margin-bottom:16px;
}

.week-day{
background:#f9fafb;
border-radius:10px;
border:1px solid #e5e7eb;
padding:8px;
text-align:center;
font-size:14px;
}

.week-list{
display:grid;
gap:8px;
}

.week-line{
background:#fafafa;
border-radius:10px;
border:1px solid #e5e7eb;
padding:10px;
display:grid;
grid-template-columns:110px 150px 1fr;
gap:8px;
align-items:center;
}

.tag-green{color:#166534;font-weight:bold}
.tag-orange{color:#b45309;font-weight:bold}
.tag-red{color:#b91c1c;font-weight:bold}

@media(max-width:800px){
.mini-grid{grid-template-columns:repeat(2,1fr)}
.risk-grid{grid-template-columns:repeat(2,1fr)}
.hours-grid{grid-template-columns:repeat(2,1fr)}
.week-calendar{grid-template-columns:repeat(4,1fr)}
.week-line{grid-template-columns:1fr;text-align:center}
}

</style>
</head>


<body>

<header>🍇 Alerte Vigne</header>

<div class="container">

<div class="card">
<h2>Localisation</h2>

<input id="ville" placeholder="Nom de la ville ou village">

<div class="btn-row">
<button class="green" onclick="getWeather()">Voir météo</button>
<button class="gray" onclick="gps()">Utiliser GPS</button>
</div>

<div class="small" id="statusText">Entrez un lieu</div>
</div>


<div class="card">
<div id="topAlert" class="banner warn">Aucune alerte</div>
</div>


<div class="card">
<h2>Lieu sélectionné</h2>
<div class="big" id="placeName">---</div>
<div class="small" id="coords">---</div>
</div>


<div class="card">
<h2>Météo actuelle</h2>

<div class="mini-grid">

<div class="mini">
<div class="mini-title">Température</div>
<div class="mini-value" id="tempNow">--</div>
</div>

<div class="mini">
<div class="mini-title">Humidité</div>
<div class="mini-value" id="humidityNow">--</div>
</div>

<div class="mini">
<div class="mini-title">Pluie</div>
<div class="mini-value" id="rainNow">--</div>
</div>

<div class="mini">
<div class="mini-title">Vent</div>
<div class="mini-value" id="windNow">--</div>
</div>

</div>
</div>


<div class="card">
<h2>Décision</h2>

<div class="big" id="decisionMain">---</div>
<div class="small" id="decisionText">---</div>

</div>



<div class="card">

<h2>Risques maladies</h2>

<div class="risk-grid">

<div class="risk" id="mildiouBox">
<strong>Mildiou</strong>
<div id="mildiouValue">---</div>
</div>

<div class="risk" id="oidiumBox">
<strong>Oïdium</strong>
<div id="oidiumValue">---</div>
</div>

<div class="risk" id="blackrotBox">
<strong>Black rot</strong>
<div id="blackrotValue">---</div>
</div>

<div class="risk" id="eudemisBox">
<strong>Eudémis</strong>
<div id="eudemisValue">---</div>
</div>

</div>

</div>


<div class="card">

<h2>Heures idéales</h2>

<div class="hours-grid" id="hoursGrid"></div>

</div>


<div class="card">

<h2>Plan semaine</h2>

<div id="weekSummary" class="small"></div>

<div class="week-calendar" id="weekCalendar"></div>

<div class="week-list" id="weekList"></div>

</div>


</div>


<script>

function setStatus(t){document.getElementById("statusText").innerText=t}

function gps(){
navigator.geolocation.getCurrentPosition(function(pos){
loadWeather(pos.coords.latitude,pos.coords.longitude,"GPS")
})
}

function getWeather(){

let ville=document.getElementById("ville").value

fetch("https://geocoding-api.open-meteo.com/v1/search?name="+ville+"&count=1")
.then(r=>r.json())
.then(data=>{
let lat=data.results[0].latitude
let lon=data.results[0].longitude
let place=data.results[0].name
loadWeather(lat,lon,place)
})

}

function loadWeather(lat,lon,place){

let url="https://api.open-meteo.com/v1/forecast?latitude="+lat+"&longitude="+lon+"&current=temperature_2m,precipitation,wind_speed_10m,relative_humidity_2m&hourly=temperature_2m,precipitation,wind_speed_10m,relative_humidity_2m&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,wind_speed_10m_max&timezone=auto"

fetch(url)
.then(r=>r.json())
.then(data=>{

document.getElementById("placeName").innerText=place
document.getElementById("coords").innerText="Lat "+lat+" | Lon "+lon

document.getElementById("tempNow").innerText=data.current.temperature_2m+"°C"
document.getElementById("humidityNow").innerText=data.current.relative_humidity_2m+"%"
document.getElementById("rainNow").innerText=data.current.precipitation+" mm"
document.getElementById("windNow").innerText=data.current.wind_speed_10m+" km/h"

computeDecision(data)
renderHours(data.hourly)
renderWeek(data)

})

}

function computeDecision(data){

let rainTomorrow=data.daily.precipitation_sum[1]
let wind=data.current.wind_speed_10m
let humidity=data.current.relative_humidity_2m

let decision="Attendre"
let txt="Situation calme"

if(wind>25){
decision="Éviter traitement"
txt="Vent trop fort"
}

else if(rainTomorrow>8){
decision="Éviter aujourd'hui"
txt="Pluie forte demain"
}

else if(humidity>85){
decision="Traiter"
txt="Risque mildiou élevé"
}

document.getElementById("decisionMain").innerText=decision
document.getElementById("decisionText").innerText=txt

document.getElementById("mildiouValue").innerText=humidity>85?"Élevé":"Faible"
document.getElementById("oidiumValue").innerText="Moyen"
document.getElementById("blackrotValue").innerText="Faible"
document.getElementById("eudemisValue").innerText="Faible"

}

function renderHours(h){

let container=document.getElementById("hoursGrid")
container.innerHTML=""

for(let i=0;i<8;i++){

let hour=h.time[i].split("T")[1]

let wind=h.wind_speed_10m[i]
let rain=h.precipitation[i]

let status="Correct"

if(wind<15 && rain<0.2)status="Idéal"
if(wind>25 || rain>1)status="Éviter"

container.innerHTML+=`
<div class="hour">
<strong>${hour}</strong><br>
${status}<br>
Vent ${wind}<br>
Pluie ${rain}
</div>
`

}

}

function renderWeek(data){

let days=["Aujourd’hui","Demain","J+2","J+3","J+4","J+5","J+6"]

let cal=document.getElementById("weekCalendar")
let list=document.getElementById("weekList")

cal.innerHTML=""
list.innerHTML=""

for(let i=0;i<7;i++){

let rain=data.daily.precipitation_sum[i]
let wind=data.daily.wind_speed_10m_max[i]

let action="Attendre"
let icon="⏳"
let cls="tag-orange"

if(wind>25){action="Éviter";icon="❌";cls="tag-red"}
else if(rain<2){action="Traiter";icon="✅";cls="tag-green"}

cal.innerHTML+=`
<div class="week-day">
${days[i]}<br>${icon}
</div>
`

list.innerHTML+=`
<div class="week-line">
<div>${days[i]}</div>
<div class="${cls}">${icon} ${action}</div>
<div>Pluie ${rain}mm | Vent ${wind}km/h</div>
</div>
`

}

}

</script>

</body>
</html>
